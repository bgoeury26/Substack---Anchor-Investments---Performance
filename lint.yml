# .github/workflows/lint.yml
# Runs on every push: checks Python syntax and imports.

name: Lint & Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: python -m py_compile app.py config.py storage.py auth.py data_loader.py portfolio_engine.py charts.py

      - name: Run import checks
        run: |
          python -c "import config, storage, auth, data_loader, portfolio_engine, charts"
        env:
          ADMIN_PASSWORD_HASH: "$2b$12$placeholder"
          DB_PATH: "data/portfolio.db"
